# Replaces the stock nginx-unprivileged default server.
#
# Hugo emits pretty URLs (/speaking/index.html). We want BOTH /speaking and
# /speaking/ to return that page as a direct 200 — no redirect. Serving it
# directly (rather than 301-ing to add the trailing slash) means nginx never
# writes a Location header, so the container's internal :8080 can never leak
# out behind the preview reverse proxy (https://pr<N>.preview.koudijs.dev).
server {
    listen       8080;
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    # Defence in depth: should anything ever redirect, keep it relative so the
    # internal scheme/host/:8080 still never leaks.
    absolute_redirect off;

    # /speaking -> /speaking/index.html, /speaking/ -> /speaking/index.html,
    # both served in place with no client-visible redirect.
    location / {
        try_files $uri $uri.html $uri/index.html $uri/ =404;
    }

    error_page 404 /404.html;
}
