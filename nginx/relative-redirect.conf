# Emit relative redirects (Location: /path/ instead of http://host:8080/path/).
#
# This image listens on :8080 (nginx-unprivileged) but is reached behind the
# preview reverse proxy at https://pr<N>.preview.koudijs.dev. Hugo's pretty URLs
# mean a request like /speaking (no trailing slash) gets a 301 to /speaking/.
# With the default `absolute_redirect on`, nginx bakes its own scheme+host+port
# into that Location header, leaking the internal http://...:8080 to the browser.
# Relative redirects let the browser keep the public origin it's already on.
#
# Included inside the http{} block (via conf.d/*.conf) so the default server
# inherits it.
absolute_redirect off;
